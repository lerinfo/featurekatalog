{% extends "base.html" %}
{% block title %}{{ xsdtype.prefixed_name }} – Kavaler{% endblock %}
{% block content %}
<h1>{{ xsdtype.prefixed_name }}</h1>
<div class="table-responsive">
<table class="table table-striped table-bordered align-top">
  <tr><th>name</th><th>abstract</th></tr>
  {% for row in chain %}
  <tr>
    <td class="font-monospace">{{ row.prefixed_name }}</td>
    <td>{{ 'abstract' if row.abstract else '' }}</td>
  </tr>
  {% endfor %}
</table>
</div>
{% endblock %}
