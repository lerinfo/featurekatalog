<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}featurekatalog{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  td, dd { white-space: pre-wrap; }
  code { color: #d6336c; }
  .pakke-badge { font-size: 0.85em; }
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">featurekatalog</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('featuretype_list') }}">List</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('featuretype_tree') }}">Tree</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('restriktioner') }}">Restriktioner</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('general_constraints') }}">Andre krav</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
<div class="container pb-5">
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
