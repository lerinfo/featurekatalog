- feature_type: LinearDimension
  name: geometryDataTypeConstraint
  expression: |-
    The dimension line shall use linear interpolation.
    Note: In a GML encoding, this means that these geometries, which are curves, must have a geometry type that is one of the following [GML SF]:
    * gml:LineString
    * gml:Curve consisting of segments having type gml:LineStringSegment
