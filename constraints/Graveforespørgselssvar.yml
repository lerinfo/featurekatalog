- feature_type: Graveforespørgselssvar
  code: Grav01
  name: forventetAfleveringstidspunktBetingelse
  expression: |
    Det forventede afleveringstidspunkt må ikke være angivet hvis typen af graveforespørgselssvaret ikke er "udtaget til manuel behandling".
    Det forventede afleveringstidspunkt må godt være angivet hvis typen af graveforespørgselssvaret er "udtaget til manuel behandling".

- feature_type: Graveforespørgselssvar
  code: Grav02
  name: idRestriktion
  expression: |
    id'et skal være en UUID, som defineret i [ITU-T X.667].
    Note: Bemærk, at en anbefaling i [ITU-T X.667] er følgende:
    "It is recommended that the hexadecimal representation used in all human-readable formats be restricted to lower-case letters. Software processing this representation is, however, required to accept both upper and lower case letters".

- feature_type: Graveforespørgselssvar
  code: Grav03
  name: indholdGM_ObjectSRIRestriktion
  expression: |
    En featuretype indeholdt i et graveforespørgselssvar skal anvende det sammensatte koordinatereferencesystem med URI http://www.opengis.net/def/crs/EPSG/0/7416 som koordinatereferencesystemet for attributter der har GM_Object eller en af dets subtyper som typer.
    Note 1: Koordinatereferencesystemet med URI http://www.opengis.net/def/crs/EPSG/0/7416 har som navn "ETRS89 / UTM zone 32N + DVR90 height".
    Note 2: GM_Object har bl.a. GM_Point, GM_Curve og GM_MultiCurve som subtyper, se også ISO 19107.
    Note 3: Det betyder, at fx Ledning.geometri og LinearDimension.dimensionLine skal anvende koordinatereferencesystemet med URI http://www.opengis.net/def/crs/EPSG/0/7416.

- feature_type: Graveforespørgselssvar
  code: Grav04
  name: indholdKoteSRIRestriktion
  expression: |
    En featuretype indeholdt i et graveforespørgselssvar skal anvende det vertikale koordinatereferencesystemet med URI http://www.opengis.net/def/crs/EPSG/0/5799 som koordinatereferencesystemet for attributter der repræsenterer en kote.
    Note 1: Koordinatereferencesystemet med URI http://www.opengis.net/def/crs/EPSG/0/5799 har som navn "DVR90 height".
    Note 2: En attribut der repræsenterer en kote har DirectPosition som type.
    Note 3: Det betyder, at fx Gaskomponent.topkote skal anvende koordinatereferencesystemet med URI http://www.opengis.net/def/crs/EPSG/0/5799.
